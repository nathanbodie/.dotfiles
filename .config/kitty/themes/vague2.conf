# Vague theme for Kitty
# Based on the "vague" Neovim theme
# A dark, muted theme with sophisticated colors

# Background and foreground
background #141415
foreground #cdcdcd

# Selection colors
selection_background #333738
selection_foreground #cdcdcd

# Cursor colors
cursor #cdcdcd
cursor_text_color #141415

# Normal colors (0-7)
# black (background)
color0 #141415
# red (error)
color1 #d8647e
# green (plus/success)
color2 #7fa563
# yellow (warning/delta)
color3 #f3be7c
# blue (hint)
color4 #7e98e8
# magenta (parameter)
color5 #bb9dbd
# cyan (type)
color6 #9bb4bc
# white (foreground)
color7 #cdcdcd

# Bright colors (8-15)
# bright black (comment)
color8 #606079
# bright red
color9 #d8647e
# bright green
color10 #7fa563
# bright yellow (number)
color11 #e0a363
# bright blue (keyword)
color12 #6e94b2
# bright magenta
color13 #bb9dbd
# bright cyan (builtin)
color14 #b4d4cf
# bright white (property)
color15 #c3c3d5

# Window padding
window_padding_width 8
